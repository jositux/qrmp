<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Fondo oscuro redondeado -->
  <rect width="32" height="32" rx="7" fill="#0f1a14"/>

  <!-- Finder pattern: arriba izquierda -->
  <rect x="3" y="3" width="11" height="11" rx="2" fill="#22c55e"/>
  <rect x="5" y="5" width="7" height="7" rx="1" fill="#0f1a14"/>
  <rect x="7" y="7" width="3" height="3" fill="#22c55e"/>

  <!-- Finder pattern: arriba derecha -->
  <rect x="18" y="3" width="11" height="11" rx="2" fill="#22c55e"/>
  <rect x="20" y="5" width="7" height="7" rx="1" fill="#0f1a14"/>
  <rect x="22" y="7" width="3" height="3" fill="#22c55e"/>

  <!-- Finder pattern: abajo izquierda -->
  <rect x="3" y="18" width="11" height="11" rx="2" fill="#22c55e"/>
  <rect x="5" y="20" width="7" height="7" rx="1" fill="#0f1a14"/>
  <rect x="7" y="22" width="3" height="3" fill="#22c55e"/>

  <!-- Módulos de datos (zona abajo derecha) -->
  <rect x="18" y="18" width="3" height="3" fill="#22c55e"/>
  <rect x="23" y="18" width="3" height="3" fill="#22c55e"/>
  <rect x="18" y="23" width="3" height="3" fill="#22c55e"/>
  <rect x="26" y="18" width="3" height="3" fill="#22c55e"/>
  <rect x="21" y="21" width="3" height="3" fill="#22c55e"/>
  <rect x="26" y="21" width="3" height="3" fill="#22c55e"/>
  <rect x="18" y="26" width="3" height="3" fill="#22c55e"/>
  <rect x="23" y="26" width="3" height="3" fill="#22c55e"/>
  <rect x="26" y="26" width="3" height="3" fill="#22c55e"/>
</svg>
